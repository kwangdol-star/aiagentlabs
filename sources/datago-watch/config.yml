# 공공데이터포털 diff — 스펙 v4 #12 (datago-watch), 페이지 텍스트형. 감시탑 역할 MVP.
#
# 이중 역할 중 "감시탑"부터: 우리 소스들이 의존하는 데이터셋의 포털 페이지를
# 일간 박제해 변경·중단·폐기 공지를 조기 감지한다 (우리 크론이 죽기 전에 안다).
# "상품"(포털 전체 메타 diff·삭제 원장)은 목록 API 검증 후 확장.
#
# 새 소스를 추가할 때마다 그 소스가 의존하는 데이터셋 페이지를 여기에도 추가할 것.
id: datago-watch
family: page-text
title: 공공데이터포털 감시탑 — 의존 데이터셋 변경 감지

user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0 Safari/537.36 chronicle-archive/0.1 (+https://github.com/kwangdol-star/aiagentlabs)"
rate_limit_ms: 1000

# 주의: www.data.go.kr 포털 페이지는 해외 IP(GitHub 러너)를 네트워크 레벨에서
# 차단한다(첫 가동에서 확인). 대신 차단 없는 기계 표면을 감시한다 — 더 직접적이다:
#   - 청약홈: odcloud 스웨거 스펙 JSON — API 스펙 개정·오퍼레이션 변경이 그대로 diff
#   - RTMS: 엔드포인트 무키 프로브 — 서비스 존재·게이트웨이 오류 형식의 변화 감지
#     (키 없이 호출하면 안정적인 오류 XML이 오고, 서비스 폐기 시 그 형태가 바뀐다)
targets:
  - id: bunyang-capsule-api
    url: https://infuser.odcloud.kr/api/stages/37000/api-docs # 청약홈 API 스웨거 스펙 (bunyang-capsule 의존)
  - id: apt-trade-api
    url: http://apis.data.go.kr/1613000/RTMSDataSvcAptTradeDev/getRTMSDataSvcAptTradeDev # RTMS 무키 프로브 (deal-audit-ledger 의존)
