# 실거래 취소·정정 원장 — 스펙 v4 #5 (deal-audit-ledger), API 레코드형.
#
# 소스: 국토교통부_아파트 매매 실거래가 상세 자료 (RTMSDataSvcAptTradeDev)
#   ★ 별도 활용신청 필요: data.go.kr에서 "국토교통부_아파트 매매 실거래가 상세 자료"
#     (https://www.data.go.kr/data/15126468/openapi.do) 활용신청 → 자동승인.
#     같은 계정이면 기존 DATA_GO_KR_KEY 그대로 사용된다 (serviceKey 쿼리 파라미터 방식).
#
# 취소는 행이 사라지지 않고 해제여부(cdealType='O')·해제사유발생일(cdealDay)이
# 붙는다 → 필드 단위 변경 이벤트로 봉인. 정정은 금액이 바뀐 새 행으로 나타난다 →
# 원 레코드 삭제 + 새 레코드 생성 쌍으로 전후가 모두 원장에 남는다.
#
# MVP 범위: 서울 25개 구 × 최근 6개월 (일 150콜 — 개발계정 한도 10,000의 1.5%).
# 확장은 lawd_codes에 시군구 코드를 추가하면 된다.
id: deal-audit-ledger
family: api-records
title: 실거래 취소·정정 원장 — 아파트 매매 (서울)

endpoint: http://apis.data.go.kr/1613000/RTMSDataSvcAptTradeDev/getRTMSDataSvcAptTradeDev
window_months: 6 # 계약월 기준 폴링·삭제감지 윈도 — 취소/정정은 과거 계약에 발생하므로 재폴링 필수
num_of_rows: 1000
rate_limit_ms: 300

# 법정동코드 앞 5자리 (서울 25개 구)
lawd_codes:
  - "11110" # 종로구
  - "11140" # 중구
  - "11170" # 용산구
  - "11200" # 성동구
