  - "11230" # 동대문구
  - "11260" # 중랑구
  - "11290" # 성북구
  - "11305" # 강북구
  - "11320" # 도봉구
  - "11350" # 노원구
  - "11380" # 은평구
  - "11410" # 서대문구
  - "11440" # 마포구
  - "11470" # 양천구
  - "11500" # 강서구
  - "11530" # 구로구
  - "11545" # 금천구
  - "11560" # 영등포구
  - "11590" # 동작구
