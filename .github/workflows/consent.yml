# Chronicle #16 Agent-Web 동의 센서스 (consent-census) — standalone 리포용.
#
# 일 1회 상위 도메인의 robots.txt·llms.txt를 스냅샷해 AI 크롤러 차단/허용 diff를
# 봉인한다. 법적 최청정(robots.txt 페치=용도 그 자체). Secret 불필요.
# Manual: Actions tab -> "consent" -> Run workflow.
name: consent

on:
  workflow_dispatch: {}
  schedule:
    - cron: "23 20 * * *" # daily ~05:23 KST

permissions:
  contents: write

concurrency:
  group: chronicle-cron # 전 수집 크론 직렬화 — docs 동시 재생성 경합 방지
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Collect + seal (변경 없으면 아무것도 쓰지 않음)
        run: npm run collect -- consent-census

      - name: Verify hash chain
        run: npm run verify -- consent-census

      - name: Anchor chain head to RFC 3161 TSA (best-effort)
        run: npm run anchor -- consent-census

      - name: Publish site (docs/)
        run: |
          npm run site
          test -f docs/index.html && test -f docs/.nojekyll  # 산출물 없으면 여기서 실패

      - name: Commit accumulated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data docs
          if git diff --cached --quiet; then
            echo "no data change"
          else
            git commit -m "data(consent-census): daily consent census [skip ci]"
            n=0
            until git push; do
              n=$((n+1))
              if [ "$n" -ge 3 ]; then echo "push failed after $n attempts" >&2; exit 1; fi
              git pull --rebase origin "$GITHUB_REF_NAME"
            done
          fi
