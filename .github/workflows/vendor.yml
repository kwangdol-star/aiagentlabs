# Chronicle #14 AI 벤더 원장 (ai-vendor-ledger) — standalone 리포용.
#
# 주 1회 OpenRouter 공개 모델 API에서 전 벤더의 모델·가격·컨텍스트를 관측해
# 봉인한다. 가격 변경·모델 폐기의 이력을 우리가 소유한다. Secret 불필요(무인증).
# Manual: Actions tab -> "vendor" -> Run workflow.
name: vendor

on:
  workflow_dispatch: {}
  schedule:
    - cron: "7 20 * * 6" # weekly ~05:07 KST Sun (UTC Sat 20:07)

permissions:
  contents: write

concurrency:
  group: chronicle-cron # 전 수집 크론 직렬화 — docs 동시 재생성 경합 방지
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Collect + seal (변경 없으면 아무것도 쓰지 않음)
        run: npm run collect -- ai-vendor-ledger

      - name: Verify hash chain
        run: npm run verify -- ai-vendor-ledger

      - name: Anchor chain head to RFC 3161 TSA (best-effort)
        run: npm run anchor -- ai-vendor-ledger

      - name: Publish site (docs/)
        run: |
          npm run site
          test -f docs/index.html && test -f docs/.nojekyll  # 산출물 없으면 여기서 실패

      - name: Commit accumulated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data docs
          if git diff --cached --quiet; then
            echo "no data change"
          else
            git commit -m "data(ai-vendor-ledger): weekly vendor ledger [skip ci]"
            n=0
            until git push; do
              n=$((n+1))
              if [ "$n" -ge 3 ]; then echo "push failed after $n attempts" >&2; exit 1; fi
              git pull --rebase origin "$GITHUB_REF_NAME"
            done
          fi
