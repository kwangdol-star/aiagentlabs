# Chronicle #12 공공데이터포털 감시탑 (datago-watch) — standalone 리포용.
#
# 일 1회 우리 소스가 의존하는 데이터셋 포털 페이지를 박제해 변경·중단 공지를 조기 감지한다.
# Secret 불필요 (공개 페이지).
# Manual: Actions tab -> "datago" -> Run workflow.
name: datago

on:
  workflow_dispatch: {}
  schedule:
    - cron: "53 21 * * *" # daily ~06:53 KST

permissions:
  contents: write

concurrency:
  group: chronicle-datago
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Collect + seal (변경 없으면 아무것도 쓰지 않음)
        run: npm run collect -- datago-watch

      - name: Verify hash chain
        run: npm run verify -- datago-watch

      - name: Anchor chain head to RFC 3161 TSA (best-effort)
        run: npm run anchor -- datago-watch

      - name: Publish site (docs/)
        run: |
          npm run site
          test -f docs/index.html && test -f docs/.nojekyll  # 산출물 없으면 여기서 실패

      - name: Commit accumulated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data docs
          if git diff --cached --quiet; then
            echo "no data change"
          else
            git commit -m "data(datago-watch): portal watch [skip ci]"
            n=0
            until git push; do
              n=$((n+1))
              if [ "$n" -ge 3 ]; then echo "push failed after $n attempts" >&2; exit 1; fi
              git pull --rebase origin "$GITHUB_REF_NAME"
            done
          fi
