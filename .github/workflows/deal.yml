# Chronicle #5 실거래 취소·정정 원장 (deal-audit-ledger) — standalone 리포용.
#
# 일 1회 서울 아파트 매매 실거래를 재폴링해 취소(cdealType)·정정(금액 대체)을 원장에 봉인한다.
# 요구 Secret: DATA_GO_KR_KEY + data.go.kr에서 RTMS 상세자료 활용신청 선행 (config.yml 참고).
# Manual: Actions tab -> "deal" -> Run workflow.
name: deal

on:
  workflow_dispatch: {}
  schedule:
    - cron: "17 22 * * *" # daily ~07:17 KST — 청약 크론(06:47) 이후

permissions:
  contents: write

concurrency:
  group: chronicle-cron # 전 수집 크론 직렬화 — docs 동시 재생성 경합 방지
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Collect + seal (변경 없으면 아무것도 쓰지 않음)
        env:
          DATA_GO_KR_KEY: ${{ secrets.DATA_GO_KR_KEY }}
        run: npm run collect -- deal-audit-ledger

      - name: Verify hash chain
        run: npm run verify -- deal-audit-ledger

      - name: Anchor chain head to RFC 3161 TSA (best-effort)
        run: npm run anchor -- deal-audit-ledger

      - name: Publish site (docs/)
        run: |
          npm run site
          test -f docs/index.html && test -f docs/.nojekyll  # 산출물 없으면 여기서 실패

      - name: Commit accumulated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data docs
          if git diff --cached --quiet; then
            echo "no data change"
          else
            git commit -m "data(deal-audit-ledger): daily deal audit [skip ci]"
            n=0
            until git push; do
              n=$((n+1))
              if [ "$n" -ge 3 ]; then echo "push failed after $n attempts" >&2; exit 1; fi
              git pull --rebase origin "$GITHUB_REF_NAME"
            done
          fi
